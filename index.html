<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAM Social Deck</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<div id="overlay" class="overlay">

    <!-- Background Effects -->
    <div class="backgroundGlow"></div>

    <!-- Header -->
    <div class="header">

        <div class="headerIcon">
            <img id="platformIcon" src="" alt="">
        </div>

        <div class="headerTitle" id="platformName">
            FACEBOOK
        </div>

        <div class="shine"></div>

    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="qrWrapper">

            <div class="qrGlow"></div>

            <div id="qrcode"></div>

        </div>

    </div>

    <!-- Footer -->
    <div class="footer">

        <div id="subtitle">
            Join The KAM Fam Community
        </div>

    </div>

</div>

<!-- Configuration -->
<script src="config.js"></script>

<!-- Main Script -->
<script src="script.js"></script>

</body>
</html>
