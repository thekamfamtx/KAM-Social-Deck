<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KAM Fam QR Overlay</title>

  <link rel="stylesheet" href="style.css" />

  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

  <div class="overlay">

    <div class="top">
      <div id="brandName" class="brand"></div>
      <div id="memberTag" class="member"></div>
    </div>

    <div class="center">
      <div id="qrcode" class="qr"></div>
    </div>

    <div class="bottom">
      <div id="qrLabel" class="label"></div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>

</body>
</html>
